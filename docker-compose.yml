services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-platform
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:8080"
    environment:
      SERVER_PORT: 8080
    volumes:
      - ./models:/opt/models
      - ./tools:/opt/tools
      - ./mcp-servers:/opt/mcp-servers
      - ./skills:/opt/skills
      - ./viewports:/opt/viewports
      - ./agents:/opt/agents
      - ./teams:/opt/teams
      - ./chats:/opt/chats
      - ./application.yml:/opt/application.yml:ro
    env_file:
      - .env
