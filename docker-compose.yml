services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-platform-runner
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:8080"
    environment:
      SERVER_PORT: 8080
    volumes:
      - ./configs:/opt/configs:ro
      - ./agents:/opt/agents
      - ./teams:/opt/teams
      - ./models:/opt/models
      - ./providers:/opt/providers
      - ./tools:/opt/tools
      - ./mcp-servers:/opt/mcp-servers
      - ./viewport-servers:/opt/viewport-servers
      - ./viewports:/opt/viewports
      - ./skills:/opt/skills
      - ./schedules:/opt/schedules
      - ./chats:/opt/chats
    env_file:
      - .env
    networks:
      zenmind-network:
        aliases:
          - agent-platform-runner

networks:
  zenmind-network:
    external: true
