agent:
  tools:
    container-hub:
      enabled: true
      base-url: http://127.0.0.1:11960
      auth-token:
      default-environment-id:
      request-timeout-ms: 30000
      # 默认沙箱级别: run / agent / global
      default-sandbox-level: run
      # agent 级别会话空闲超时（ms），超时后自动驱逐
      agent-idle-timeout-ms: 600000
      # run 级别会话异步销毁延迟（ms）
      destroy-queue-delay-ms: 5000
      # 挂载目录配置（为空时 fallback 到对应全局配置）
      # 非空 mount source 必须是宿主机上已存在的目录；本地环境建议直接写绝对路径。
      # 若使用相对路径，解析基线是服务运行目录，而不是本 YAML 文件所在目录。
      mounts:
        data-dir:
        user-dir: ./user
        skills-dir:
        pan-dir: ./pan
