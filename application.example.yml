server:
  port: 11949

agent:
  # Local overrides for development. Copy this file to application.yml
  # and replace placeholder values with your own settings.
  auth:
    enabled: true
    # Optional: set either local-public-key or jwks settings.
    # local-public-key: |
    #   -----BEGIN PUBLIC KEY-----
    #   REPLACE_WITH_YOUR_RSA_PUBLIC_KEY
    #   -----END PUBLIC KEY-----
  voice:
    ws:
      # 语音 websocket 总开关；默认关闭
      enabled: false
      # 单入口多命令通道
      path: /api/ap/ws/voice
      # true: 需要在 WS URL 携带 ?access_token=<token>；false: 放开 voice ws（仅开发联调建议）
      auth-required: true
      # 协议预留 opus，本轮实现仅支持 pcm
      codecs:
        - pcm
        - opus
      # 单连接最长存活秒数
      max-session-seconds: 300
      # 默认 PCM 参数
      default-sample-rate: 24000
      default-channels: 1
    tts:
      # 可选: synthetic / aliyun
      provider: synthetic
      aliyun:
        endpoint: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
        api-key: replace-with-your-aliyun-tts-api-key
        model: qwen3-tts-instruct-flash-realtime
        voice: Cherry
        language-type: Auto
        mode: server_commit
        format: pcm
        sample-rate: 24000
        speech-rate: 1.0
        volume: 50
        pitch-rate: 1.0
        bit-rate: 128
        response-format: PCM_24000HZ_MONO_16BIT
        instructions:
        optimize-instructions: false
        session-finished-timeout-ms: 120000
        log-sent-chunk-enabled: false
  cors:
    # master switch: false = disable CORS filter
    enabled: false
    path-pattern: /api/**
    allowed-origin-patterns:
      - https://example.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Content-Type
    allow-credentials: false
    max-age-seconds: 3600
  chat-image-token:
    secret: replace-with-your-chat-image-token-secret
    ttl-seconds: 86400
    # when true, GET /api/ap/data?t=... may return 403 for invalid/expired token
    data-token-validation-enabled: true
  providers:
    bailian:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: replace-with-your-bailian-api-key
      model: qwen3.5-plus
    siliconflow:
      base-url: https://api.siliconflow.cn
      api-key: replace-with-your-siliconflow-api-key
      model: deepseek-ai/DeepSeek-V3.2
  mcp-servers:
    enabled: true
    protocol-version: 2025-06
    connect-timeout-ms: 3000
    retry: 1
    servers: []
  tools:
    external-dir: tools
    refresh-interval-ms: 30000
    bash:
      # 低权限模式（默认生效）：保留基础命令白名单与路径校验。
      working-directory: ${user.dir}
      allowed-paths: ${user.dir},/tmp
      allowed-commands: ls,pwd,cat,head,tail,top,free,df,git,rg,find
      path-checked-commands: ls,cat,head,tail,git,rg,find
      path-check-bypass-commands: git
      shell-features-enabled: false
      shell-executable: bash
      shell-timeout-ms: 10000
      max-command-chars: 16000
      # 高权限模式（注释模板，按需手动切换）：
      # 1) 将下列注释行复制替换上面的低权限值；
      # 2) bypass 仅对 allowed-commands 交集生效（命令未放行时 bypass 不生效）。
      # working-directory: ${user.home}
      # allowed-paths: ${user.dir},${user.home}/Project,${user.home}/Server,/tmp,/dev/null
      # allowed-commands: ls,pwd,cat,head,tail,top,free,df,git,rg,find,grep,wc,curl
      # path-checked-commands: ls,cat,head,tail,git,rg,find,grep,wc,curl
      # path-check-bypass-commands: git,curl,ls,find,grep,wc
      # shell-features-enabled: true
      # shell-executable: bash
      # shell-timeout-ms: 10000
      # max-command-chars: 16000
  # schedule 默认值已由内置 application.yml 提供（external-dir/enabled/pool-size）。
  # 如需统一时区，可仅覆盖 default-zone-id；留空则使用系统时区。
  schedule:
    default-zone-id: Asia/Shanghai

memory:
  chats:
    # Directory and sqlite file use built-in defaults by default, and can still be overridden by env vars.
    index:
      auto-rebuild-on-incompatible-schema: true

logging:
  agent:
    request:
      # API 请求摘要日志（/api/ap/**）
      enabled: true
      # 是否记录 query 参数（敏感键会自动掩码）
      include-query: true
      # 是否记录请求体摘要（不记录 header）
      include-body: false
    auth:
      # 401/403 原因日志（missing header / bad bearer / jwt verify / claim invalid）
      enabled: true
    exception:
      # 统一异常处理日志
      enabled: true
    tool:
      # tool 调用与结果摘要日志
      enabled: true
      include-args: false
      include-result: false
    action:
      # action 调用与结果摘要日志
      enabled: true
      include-args: false
      include-result: false
    viewport:
      # viewport API 命中/未命中日志
      enabled: true
    sse:
      # 每条 SSE event 日志（默认关闭，排障时临时开启）
      enabled: false
      # 开启 SSE 日志后，是否附带 payload
      include-payload: false
      # 可选白名单（逗号分隔），空表示不过滤
      event-whitelist:
    llm:
      interaction:
        # LLM 交互日志总开关
        enabled: true
        # 是否脱敏敏感字段（建议保持 true）
        mask-sensitive: true

  level:
    root: INFO
    com.linlay.agentplatform: INFO
    com.linlay.agentplatform.service.LlmService: DEBUG
    com.linlay.agentplatform.service.OpenAiCompatibleSseClient: DEBUG
    com.linlay.agentplatform.service.LlmCallLogger: DEBUG
    com.linlay.agentplatform.llm.wiretap: DEBUG
