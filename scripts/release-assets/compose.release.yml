name: agent-platform-runner

services:
  agent-platform:
    container_name: agent-platform-runner
    image: agent-platform-runner:${RUNNER_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-11949}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SANDBOX_HOST_DIRS_FILE: /tmp/runner-host.env
    volumes:
      - type: bind
        source: ./configs
        target: /opt/configs
        read_only: true
      - type: bind
        source: ./.env
        target: /tmp/runner-host.env
        read_only: true
      - type: bind
        source: ${PROVIDERS_DIR:-./runtime/registries/providers}
        target: /opt/registries/providers
      - type: bind
        source: ${MODELS_DIR:-./runtime/registries/models}
        target: /opt/registries/models
      - type: bind
        source: ${MCP_SERVERS_DIR:-./runtime/registries/mcp-servers}
        target: /opt/registries/mcp-servers
      - type: bind
        source: ${VIEWPORT_SERVERS_DIR:-./runtime/registries/viewport-servers}
        target: /opt/registries/viewport-servers
      - type: bind
        source: ${OWNER_DIR:-./runtime/owner}
        target: /opt/owner
      - type: bind
        source: ${AGENTS_DIR:-./runtime/agents}
        target: /opt/agents
      - type: bind
        source: ${TEAMS_DIR:-./runtime/teams}
        target: /opt/teams
      - type: bind
        source: ${ROOT_DIR:-./runtime/root}
        target: /opt/root
      - type: bind
        source: ${SCHEDULES_DIR:-./runtime/schedules}
        target: /opt/schedules
      - type: bind
        source: ${PAN_DIR:-./runtime/pan}
        target: /opt/pan
      - type: bind
        source: ${SKILLS_MARKET_DIR:-./runtime/skills-market}
        target: /opt/skills-market
      - type: bind
        source: ${CHATS_DIR:-./runtime/chats}
        target: /opt/chats
    networks:
      zenmind-network:
        aliases:
          - agent-platform-runner

networks:
  zenmind-network:
    external: true
