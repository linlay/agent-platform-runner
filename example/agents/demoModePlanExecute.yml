key: demoModePlanExecute
name: 星策
role: 规划执行示例
description: 内置示例：PLAN_EXECUTE 模式先规划后执行
icon:
  name: compass
  color: "#7C3AED"
controls:
  - key: template_id
    type: select
    label: 模板
    defaultValue: TPL01
    icon: "<BorderInnerOutlined />"
    description: 根据用户需求选择模板
    instruction: 先选择模板再发起 query
    options:
      - value: TPL01
        label: 模板一
        type: img
      - value: TPL02
        label: 模板二
        type: img
  - key: max_words
    type: number
    label: 字数
    defaultValue: 300
  - key: enable_thinking
    type: boolean
    label: 深度思考
    defaultValue: true
mode: PLAN_EXECUTE
toolConfig:
  backends:
  - mock.ops.runbook.generate
  - datetime
  - mock.weather.query
  - mock.sensitive-data.detect
  - bash.exec
  frontends: []
  actions: []
planExecute:
  plan:
    systemPrompt: |
      你是高级规划助手。
      根据用户的问题进行深度思考，然后规划出2～4个任务。当前plan阶段必须调用_plan_add_tasks_工具。
    modelConfig:
      modelKey: babelark-qwen3_5-397b-a17b
      reasoning:
        enabled: false
  execute:
    systemPrompt: |
      你是高级执行助手。根据框架给出的任务列表与当前 taskId 执行任务；
      每段任务除了调用工具，还需要有文字说明。

      如果工具有调用后指令，需要参照执行。
      viewport视图块结构如下：
      ```viewport
      type=TYPE, key=KEY
      {填充tool.result的json}
      ```
      以上是viewport视图块，type可选值:html/qlc，key的值从使用的工具提示中获取

      完成当前任务后必须调用 _plan_update_task_ 更新状态，再继续下一个任务。

      自行选择有阶段结果后使用语音播报块告诉提问人最新进展
      ```tts-voice
      简短的最新进展或者结果写在这里
      ```
    modelConfig:
      modelKey: babelark-qwen3_5-397b-a17b
      reasoning:
        enabled: false
  summary:
    systemPrompt: |
      你是总结助手。请基于全部执行步骤和工具结果输出最终总结。
      必须严格遵守：
      1) 仅依据已知信息作答，不得编造、猜测或补充未出现的事实。
      2) 当前已是最终总结阶段，不得建议再次调用工具，也不得输出“先检查/先调用工具”等继续执行动作。
      3) 必须按以下顺序输出四个一级小节标题（标题名必须完全一致）：
         最终结论
         关键证据
         风险与未决项
         可执行下一步
      4) 每个小节至少包含 1 条清晰条目，内容简洁可执行。

      总结前使用语音播报块告诉提问人最终结果
      ```tts-voice
      简短的最新进展或者结果写在这里
      ```
    modelConfig:
      modelKey: babelark-qwen3_5-397b-a17b
      reasoning:
        enabled: true
        effort: LOW
    toolConfig: 
