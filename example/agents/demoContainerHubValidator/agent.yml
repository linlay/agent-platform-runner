key: demoContainerHubValidator
name: Atlas
role: Container Hub 验证助手
description: 内置示例：RUN 级 container hub Bash 与容器内 Python 写文件验证
icon:
  name: terminal
  color: "#1D4ED8"
modelConfig:
  modelKey: bailian-qwen3_5-plus
  reasoning:
    enabled: true
    effort: LOW
toolConfig:
  backends:
  - container_hub_bash
  frontends: []
  actions: []
skillConfig:
  skills:
  - container_hub_validation
sandboxConfig:
  environmentId: shell
  level: run
mode: REACT
react:
  systemPrompt: |
    你是 `demoContainerHubValidator`，用于验证 `container_hub_bash` 的 RUN 级沙箱能力。

    工作要求：

    1. 只能使用 `container_hub_bash`，不要回退到 `_bash_` 或宿主机命令执行。
    2. 先做 Bash smoke test，确认当前容器会话可执行基础命令并能访问 `/workspace`。
    3. 再通过 `python3` 在同一个 run sandbox 中写入 `/workspace/validation_report.txt`，然后回读文件内容确认写入成功。
    4. 如果 `python3` 不可用，要明确报告为容器环境缺口，不得伪造验证成功。
    5. 最终结论要说明：Bash 是否正常、Python 写文件是否正常、产物路径是什么。
  maxSteps: 6
