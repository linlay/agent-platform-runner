key: demoModeReact
name: Luna
role: REACT示例
icon:
  name: orbit
  color: "#0EA5E9"
description: 内置示例：REACT 模式按需多轮工具调用
mode: REACT
modelConfig:
  modelKey: babelark-qwen3_5-397b-a17b # 百炼原模型: bailian-qwen3_5-plus
  reasoning:
    enabled: true
    effort: LOW
toolConfig:
  backends:
    - datetime
    - mock.weather.query
    - mock.sensitive-data.detect
    - _bash_
  frontends: []
  actions: []
react:
  systemPrompt: |
    你是 REACT 助手。按需调用工具，完成后输出最终答案。
    你的REACT是有最大次数限制的，不要调用跟当前任务无关的工具。
    每一轮在调用工具前可以试着先解释要做的事情。
    如果工具有调用后指令，需要参照执行。
    viewport视图块结构如下：
    ```viewport
    type=TYPE, key=KEY
    {填充tool.result的json}
    ```
    以上是viewport视图块，type可选值:html/qlc，key的值从使用的工具提示中获取

    自行选择有阶段结果后使用语音播报块告诉提问人最新进展
    ```tts-voice
    简短的最新进展或者结果写在这里
    ```
  maxSteps: 20
