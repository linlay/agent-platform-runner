<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>terminal_command_review</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f7fafc;
      --line: #d7e0ea;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --warn: #b45309;
      --warn-soft: rgba(180, 83, 9, 0.1);
      --danger: #b91c1c;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "SF Pro Text", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(15, 118, 110, 0.08), transparent 35%),
        linear-gradient(180deg, #f8fafc, var(--bg));
      padding: 16px;
    }

    .shell {
      width: min(880px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 94%, var(--panel-soft));
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .summary {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      padding: 9px 14px;
      cursor: pointer;
    }

    button.primary {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      background: linear-gradient(145deg, #109184, #0f766e);
      color: #ffffff;
    }

    button.danger {
      border-color: rgba(185, 28, 28, 0.25);
      color: var(--danger);
    }

    .commands {
      display: grid;
      gap: 10px;
    }

    .command {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--panel) 90%, var(--panel-soft));
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .command.high-risk {
      border-color: rgba(180, 83, 9, 0.28);
      background: color-mix(in srgb, var(--warn-soft) 86%, var(--panel));
    }

    .command-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .command-title {
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(100, 116, 139, 0.12);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    code {
      display: block;
      border-radius: 10px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .reason {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      body {
        padding: 8px;
      }

      .card {
        padding: 12px;
        border-radius: 14px;
      }

      .title {
        font-size: 18px;
      }

      .toolbar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1 id="title" class="title">Terminal Command Review</h1>
      <div id="summary" class="summary">等待初始化...</div>
      <div class="toolbar">
        <button id="approveAll" class="primary" type="button">Approve All</button>
        <button id="reject" class="danger" type="button">Reject</button>
      </div>
      <div id="status" class="status">预览模式：该 viewport 仅提供命令预览和整体验收，逐步执行由外部前端实现。</div>
      <div id="commands" class="commands"></div>
    </section>
  </main>

  <script>
    const state = {
      title: 'Terminal Command Review',
      summary: '',
      allowBatchApprove: true,
      commands: []
    };

    const titleEl = document.getElementById('title');
    const summaryEl = document.getElementById('summary');
    const statusEl = document.getElementById('status');
    const commandsEl = document.getElementById('commands');
    const approveAllBtn = document.getElementById('approveAll');
    const rejectBtn = document.getElementById('reject');

    function normalizeCommand(item, index) {
      const command = item && typeof item.command === 'string' ? item.command.trim() : '';
      return {
        id: item && typeof item.id === 'string' && item.id.trim() ? item.id.trim() : `cmd-${index + 1}`,
        title: item && typeof item.title === 'string' && item.title.trim() ? item.title.trim() : `Step ${index + 1}`,
        command,
        reason: item && typeof item.reason === 'string' ? item.reason : '',
        highRisk: Boolean(item && item.highRisk)
      };
    }

    function applyPayload(raw) {
      const payload = raw && typeof raw === 'object' ? raw : {};
      const params = payload.params && typeof payload.params === 'object' ? payload.params : payload;
      const commands = Array.isArray(params.commands) ? params.commands.map(normalizeCommand).filter((item) => item.command) : [];
      state.title = typeof params.title === 'string' && params.title.trim() ? params.title.trim() : 'Terminal Command Review';
      state.summary = typeof params.summary === 'string' ? params.summary : '';
      state.allowBatchApprove = params.allowBatchApprove !== false;
      state.commands = commands;
      render();
    }

    function render() {
      titleEl.textContent = state.title;
      summaryEl.textContent = state.summary || '请先确认完整命令清单，再决定是否交给外部前端执行。';
      approveAllBtn.disabled = !state.allowBatchApprove || state.commands.length === 0;
      statusEl.textContent = state.allowBatchApprove
        ? '支持批量放行。若需要逐条确认，请在外部前端中使用更完整的执行界面。'
        : '当前仅支持拒绝或等待外部前端逐条处理。';

      commandsEl.innerHTML = '';
      if (state.commands.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'status';
        empty.textContent = '没有可审批的命令。';
        commandsEl.appendChild(empty);
        return;
      }

      state.commands.forEach((item) => {
        const card = document.createElement('article');
        card.className = `command ${item.highRisk ? 'high-risk' : ''}`;

        const head = document.createElement('div');
        head.className = 'command-head';

        const title = document.createElement('div');
        title.className = 'command-title';
        title.textContent = item.title;

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = item.highRisk ? 'High Risk' : 'Review';

        const code = document.createElement('code');
        code.textContent = item.command;

        head.append(title, badge);
        card.append(head, code);

        if (item.reason) {
          const reason = document.createElement('div');
          reason.className = 'reason';
          reason.textContent = item.reason;
          card.appendChild(reason);
        }

        commandsEl.appendChild(card);
      });
    }

    function submit(approved) {
      const commands = state.commands.map((item) => ({
        id: item.id,
        title: item.title,
        command: item.command,
        reason: item.reason,
        highRisk: item.highRisk,
        status: approved ? 'pending_external_execution' : 'rejected'
      }));
      window.parent.postMessage({
        type: 'frontend_submit',
        params: {
          approved,
          status: approved ? 'completed' : 'rejected',
          commandCount: commands.length,
          commands
        }
      }, '*');
      statusEl.textContent = approved ? '已提交批准结果，等待外部前端接管执行。' : '已提交拒绝结果。';
    }

    approveAllBtn.addEventListener('click', () => submit(true));
    rejectBtn.addEventListener('click', () => submit(false));

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (!message || typeof message !== 'object' || message.type !== 'tool_init') {
        return;
      }
      applyPayload(message.data || {});
    });

    applyPayload({
      params: {
        title: 'Terminal Command Review',
        summary: '请确认以下命令清单是否允许执行。',
        allowBatchApprove: true,
        commands: [
          { id: 'cmd-1', title: 'Inspect repo', command: 'pwd', reason: '确认当前目录', highRisk: false },
          { id: 'cmd-2', title: 'List files', command: 'ls -la', reason: '查看仓库文件', highRisk: false }
        ]
      }
    });
  </script>
</body>
</html>
