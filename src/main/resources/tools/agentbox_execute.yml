name: agentbox_execute
label: Agentbox执行
description: 调用已部署的 agentbox 服务，创建或复用容器会话并执行命令。
type: function
inputSchema:
  type: object
  properties:
    session_id:
      type: string
      description: 可选。已有会话 ID；为空时创建新会话。
    runtime:
      type: string
      description: 可选。创建会话时的镜像名前缀；为空时回落到 runner 的 agentbox 默认配置。
    version:
      type: string
      description: 可选。创建会话时的镜像 tag；为空时回落到 runner 的 agentbox 默认配置。
    cwd:
      type: string
      description: 可选。创建会话时作为默认工作目录；复用会话时仅覆盖本次执行目录。
    env:
      type: object
      description: 可选。创建会话时写入容器环境变量。
      additionalProperties:
        type: string
    mounts:
      type: array
      description: 可选。额外挂载列表，透传给 agentbox。
      items:
        type: object
        additionalProperties: true
    resources:
      type: object
      description: 可选。资源限制，透传给 agentbox。
      additionalProperties: true
    labels:
      type: object
      description: 可选。容器 labels。
      additionalProperties:
        type: string
    command:
      type: string
      description: 必填。容器内要执行的命令。
    args:
      type: array
      description: 可选。命令参数数组。
      items:
        type: string
    timeout_ms:
      type: integer
      description: 可选。本次执行超时，单位毫秒。
  required:
    - command
  additionalProperties: false
