name: _memory_read_
label: 读取记忆
description: 读取 agent 持久化记忆，可按 ID、分类、数量和排序查询
type: function
clientVisible: false
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: 可选记忆 ID；提供时只返回该条记录
    category:
      type: string
      description: 可选分类筛选
    limit:
      type: integer
      description: 可选最大返回条数，默认 10
    sort:
      type: string
      description: 可选排序，支持 recent 或 importance，默认 recent
  additionalProperties: false
