name: _datetime_
label: 日期时间
description: 获取当前或偏移后的日期时间，支持可选 timezone 和链式 offset，输出包含农历
type: function
inputSchema:
  type: object
  properties:
    timezone:
      type: string
      description: 可选时区，支持 IANA zoneId 或 UTC+8、+08:00、Z 等偏移表示
    offset:
      type: string
      description: 可选链式时间偏移，例如 +1D、+1D-3H+20m、+10M+25D、-2y、+3w；其中y=年、M=月、D=天、H=小时、m=分钟；不填或 0 表示当前时间
  additionalProperties: false
