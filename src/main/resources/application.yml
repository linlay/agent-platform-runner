server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: springai-agent-platform
  config:
    import:
      - optional:file:./application.yml
      - optional:file:/opt/application.yml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-openai-key}

agent:
  agents:
    external-dir: ${AGENT_AGENTS_EXTERNAL_DIR:agents}
    refresh-interval-ms: ${AGENT_AGENTS_REFRESH_INTERVAL_MS:10000}
  viewports:
    external-dir: ${AGENT_VIEWPORTS_EXTERNAL_DIR:viewports}
    refresh-interval-ms: ${AGENT_VIEWPORTS_REFRESH_INTERVAL_MS:30000}
  data:
    external-dir: ${AGENT_DATA_EXTERNAL_DIR:data}
  skills:
    external-dir: ${AGENT_SKILLS_EXTERNAL_DIR:skills}
    refresh-interval-ms: ${AGENT_SKILLS_REFRESH_INTERVAL_MS:30000}
    max-prompt-chars: ${AGENT_SKILLS_MAX_PROMPT_CHARS:8000}
  teams:
    external-dir: ${AGENT_TEAMS_EXTERNAL_DIR:teams}
    refresh-interval-ms: ${AGENT_TEAMS_REFRESH_INTERVAL_MS:30000}
  models:
    external-dir: ${AGENT_MODELS_EXTERNAL_DIR:models}
    refresh-interval-ms: ${AGENT_MODELS_REFRESH_INTERVAL_MS:30000}
  schedule:
    external-dir: ${AGENT_SCHEDULE_EXTERNAL_DIR:schedules}
    enabled: ${AGENT_SCHEDULE_ENABLED:true}
    default-zone-id: ${AGENT_SCHEDULE_DEFAULT_ZONE_ID:}
    pool-size: ${AGENT_SCHEDULE_POOL_SIZE:4}
  mcp-servers:
    enabled: ${AGENT_MCP_SERVERS_ENABLED:true}
    protocol-version: ${AGENT_MCP_SERVERS_PROTOCOL_VERSION:2025-06}
    connect-timeout-ms: ${AGENT_MCP_SERVERS_CONNECT_TIMEOUT_MS:3000}
    retry: ${AGENT_MCP_SERVERS_RETRY:1}
    registry:
      external-dir: ${AGENT_MCP_SERVERS_REGISTRY_EXTERNAL_DIR:mcp-servers}
    # Deprecated: runtime MCP server registration is now registry-only.
    # This key is kept for backward-compatible binding and is ignored by registry loader.
    servers: []
  tools:
    external-dir: ${AGENT_TOOLS_EXTERNAL_DIR:tools}
    refresh-interval-ms: ${AGENT_TOOLS_REFRESH_INTERVAL_MS:30000}
    frontend:
      submit-timeout-ms: ${AGENT_TOOLS_FRONTEND_SUBMIT_TIMEOUT_MS:300000}
    agent-file-create:
      default-system-prompt: ${AGENT_TOOLS_AGENT_FILE_CREATE_DEFAULT_SYSTEM_PROMPT:你是通用助理，回答要清晰和可执行。}
    bash:
      # Baseline defaults live here; concrete local whitelist is recommended in application.yml.
      # If AGENT_BASH_ALLOWED_COMMANDS is empty, _bash_ will reject all commands.
      working-directory: ${AGENT_BASH_WORKING_DIRECTORY:${user.dir}}
      allowed-paths: ${AGENT_BASH_ALLOWED_PATHS:${user.dir},/tmp}
      allowed-commands: ${AGENT_BASH_ALLOWED_COMMANDS:ls,pwd,cat,head,tail,top,free,df,git,rg,find}
      path-checked-commands: ${AGENT_BASH_PATH_CHECKED_COMMANDS:ls,cat,head,tail,git,rg,find}
      path-check-bypass-commands: ${AGENT_BASH_PATH_CHECK_BYPASS_COMMANDS:}
      shell-features-enabled: ${AGENT_BASH_SHELL_FEATURES_ENABLED:false}
      shell-executable: ${AGENT_BASH_SHELL_EXECUTABLE:bash}
      shell-timeout-ms: ${AGENT_BASH_SHELL_TIMEOUT_MS:10000}
      max-command-chars: ${AGENT_BASH_MAX_COMMAND_CHARS:16000}
  voice:
    ws:
      enabled: ${AGENT_VOICE_WS_ENABLED:false}
      path: ${AGENT_VOICE_WS_PATH:/api/ap/ws/voice}
      auth-required: ${AGENT_VOICE_WS_AUTH_REQUIRED:true}
      codecs: ${AGENT_VOICE_WS_CODECS:pcm,opus}
      max-session-seconds: ${AGENT_VOICE_WS_MAX_SESSION_SECONDS:300}
      default-sample-rate: ${AGENT_VOICE_WS_DEFAULT_SAMPLE_RATE:24000}
      default-channels: ${AGENT_VOICE_WS_DEFAULT_CHANNELS:1}
    tts:
      provider: ${AGENT_VOICE_TTS_PROVIDER:synthetic}
      aliyun:
        endpoint: ${AGENT_VOICE_TTS_ALIYUN_ENDPOINT:wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
        api-key: ${AGENT_VOICE_TTS_ALIYUN_API_KEY:}
        model: ${AGENT_VOICE_TTS_ALIYUN_MODEL:qwen3-tts-instruct-flash-realtime}
        voice: ${AGENT_VOICE_TTS_ALIYUN_VOICE:Cherry}
        language-type: ${AGENT_VOICE_TTS_ALIYUN_LANGUAGE_TYPE:Auto}
        mode: ${AGENT_VOICE_TTS_ALIYUN_MODE:server_commit}
        format: ${AGENT_VOICE_TTS_ALIYUN_FORMAT:pcm}
        sample-rate: ${AGENT_VOICE_TTS_ALIYUN_SAMPLE_RATE:24000}
        speech-rate: ${AGENT_VOICE_TTS_ALIYUN_SPEECH_RATE:1.0}
        volume: ${AGENT_VOICE_TTS_ALIYUN_VOLUME:50}
        pitch-rate: ${AGENT_VOICE_TTS_ALIYUN_PITCH_RATE:1.0}
        bit-rate: ${AGENT_VOICE_TTS_ALIYUN_BIT_RATE:128}
        response-format: ${AGENT_VOICE_TTS_ALIYUN_RESPONSE_FORMAT:PCM_24000HZ_MONO_16BIT}
        instructions: ${AGENT_VOICE_TTS_ALIYUN_INSTRUCTIONS:}
        optimize-instructions: ${AGENT_VOICE_TTS_ALIYUN_OPTIMIZE_INSTRUCTIONS:false}
        session-finished-timeout-ms: ${AGENT_VOICE_TTS_ALIYUN_SESSION_FINISHED_TIMEOUT_MS:120000}
        log-sent-chunk-enabled: ${AGENT_VOICE_TTS_ALIYUN_LOG_SENT_CHUNK_ENABLED:false}
  auth:
    enabled: ${AGENT_AUTH_ENABLED:true}
    jwks-uri: ${AGENT_AUTH_JWKS_URI:}
    issuer: ${AGENT_AUTH_ISSUER:}
    jwks-cache-seconds: ${AGENT_AUTH_JWKS_CACHE_SECONDS:}
    # Example local key in PEM format:
    # local-public-key: |
    #   -----BEGIN PUBLIC KEY-----
    #   MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAtesttesttesttesttest
    #   testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
    #   testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
    #   -----END PUBLIC KEY-----
  cors:
    # master switch: false = disable CORS filter (no Access-Control-* response headers from this service)
    enabled: false
    # apply CORS rules on matched paths only
    path-pattern: /api/**
    # controls request header: Origin (matched by pattern); this service does NOT validate Referer
    allowed-origin-patterns:
      - http://localhost:8081
    # controls preflight request header: Access-Control-Request-Method
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    # controls preflight request header: Access-Control-Request-Headers
    allowed-headers:
      - "*"
    # controls response header: Access-Control-Expose-Headers
    exposed-headers:
      - Content-Type
    # controls response header: Access-Control-Allow-Credentials
    allow-credentials: false
    # controls response header: Access-Control-Max-Age
    max-age-seconds: 3600
  chat-image-token:
    secret: ${CHAT_IMAGE_TOKEN_SECRET:}
    previous-secrets: ${CHAT_IMAGE_TOKEN_PREVIOUS_SECRETS:}
    ttl-seconds: ${CHAT_IMAGE_TOKEN_TTL_SECONDS:86400}
    # when true, GET /api/ap/data?t=... performs token validation and may return 403 if token is invalid/expired
    data-token-validation-enabled: ${CHAT_IMAGE_TOKEN_DATA_TOKEN_VALIDATION_ENABLED:true}

memory:
  chats:
    dir: ${MEMORY_CHATS_DIR:./chats}
    k: ${MEMORY_CHATS_K:20}
    charset: ${MEMORY_CHATS_CHARSET:UTF-8}
    action-tools: ${MEMORY_CHATS_ACTION_TOOLS:}
    index:
      sqlite-file: ${MEMORY_CHATS_INDEX_SQLITE_FILE:chats.db}
      auto-rebuild-on-incompatible-schema: ${MEMORY_CHATS_INDEX_AUTO_REBUILD_ON_INCOMPATIBLE_SCHEMA:true}

logging:
  agent:
    request:
      # API 请求摘要日志（覆盖 /api/ap/**）
      # 内容: method/path/status/latency/requestId/runId（可取到时）
      enabled: ${LOGGING_AGENT_REQUEST_ENABLED:true}
      # 是否记录 query 参数（会自动掩码 token/apiKey/authorization 等敏感键）
      include-query: ${LOGGING_AGENT_REQUEST_INCLUDE_QUERY:true}
      # 是否记录请求体摘要（仅记录控制器提供的摘要字段，不记录 header）
      include-body: ${LOGGING_AGENT_REQUEST_INCLUDE_BODY:false}
    auth:
      # 鉴权日志（401/403 原因码），用于定位 missing header / bad bearer / jwt verify / claim invalid
      enabled: ${LOGGING_AGENT_AUTH_ENABLED:true}
    exception:
      # 统一异常处理日志（4xx/5xx）
      enabled: ${LOGGING_AGENT_EXCEPTION_ENABLED:true}
    tool:
      # backend/frontend tool 调用摘要日志
      enabled: ${LOGGING_AGENT_TOOL_ENABLED:true}
      # 是否打印 tool 参数（可能包含业务数据，默认关闭）
      include-args: ${LOGGING_AGENT_TOOL_INCLUDE_ARGS:false}
      # 是否打印 tool 结果（可能包含大文本，默认关闭）
      include-result: ${LOGGING_AGENT_TOOL_INCLUDE_RESULT:false}
    action:
      # action 调用摘要日志
      enabled: ${LOGGING_AGENT_ACTION_ENABLED:true}
      # 是否打印 action 参数（默认关闭）
      include-args: ${LOGGING_AGENT_ACTION_INCLUDE_ARGS:false}
      # 是否打印 action 结果（默认关闭）
      include-result: ${LOGGING_AGENT_ACTION_INCLUDE_RESULT:false}
    viewport:
      # GET /api/ap/viewport 命中/未命中日志
      enabled: ${LOGGING_AGENT_VIEWPORT_ENABLED:true}
    sse:
      # 是否记录每条 SSE 事件（默认关闭，避免日志量过大）
      enabled: ${LOGGING_AGENT_SSE_ENABLED:false}
      # 开启后是否附带 payload（默认关闭）
      include-payload: ${LOGGING_AGENT_SSE_INCLUDE_PAYLOAD:false}
      # 可选白名单: 逗号分隔事件名；为空表示不过滤（例如 run.start,tool.start,tool.result）
      event-whitelist: ${LOGGING_AGENT_SSE_EVENT_WHITELIST:}
    llm:
      interaction:
        # LLM 交互日志总开关（请求体/提示词/delta 等）
        enabled: ${LOGGING_AGENT_LLM_INTERACTION_ENABLED:true}
        # 是否脱敏敏感字段（建议保持 true）
        mask-sensitive: ${LOGGING_AGENT_LLM_INTERACTION_MASK_SENSITIVE:true}
  level:
    root: INFO
    com.linlay.agentplatform: INFO
    com.linlay.agentplatform.service.LlmService: DEBUG
    com.linlay.agentplatform.service.OpenAiCompatibleSseClient: DEBUG
    com.linlay.agentplatform.service.LlmCallLogger: DEBUG
    com.linlay.agentplatform.llm.wiretap: DEBUG
